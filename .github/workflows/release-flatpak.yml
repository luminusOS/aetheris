name: Release Flatpak

on:
  workflow_call:
    outputs:
      artifact-name:
        value: ${{ jobs.flatpak.outputs.artifact-name }}
      bundle-name:
        value: ${{ jobs.flatpak.outputs.bundle-name }}
      source-name:
        value: ${{ jobs.flatpak.outputs.source-name }}

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.names.outputs.artifact_name }}
      bundle-name: ${{ steps.names.outputs.bundle_name }}
      source-name: ${{ steps.names.outputs.source_name }}
    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Read release metadata
        id: names
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BASE_VERSION="${VERSION%%-*}"
          CARGO_VERSION="$(
            python3 -c 'import pathlib, tomllib; data = tomllib.loads(pathlib.Path("Cargo.toml").read_text()); print(data["workspace"]["package"]["version"])'
          )"

          if [ "$BASE_VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag ${TAG} does not match workspace version ${CARGO_VERSION}." >&2
            exit 1
          fi

          mkdir -p dist
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=flatpak-bundle" >> "$GITHUB_OUTPUT"
          echo "bundle_name=aetheris-${VERSION}.flatpak" >> "$GITHUB_OUTPUT"
          echo "source_name=aetheris-${VERSION}-source.zip" >> "$GITHUB_OUTPUT"

      - name: Install Flatpak builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Build Flatpak
        run: |
          set -euo pipefail
          flatpak-builder \
            --user \
            --force-clean \
            --disable-rofiles-fuse \
            --install-deps-from=flathub \
            --repo=target/flatpak/repo \
            target/flatpak/build \
            build-aux/org.luminusos.Aetheris.json
          flatpak build-bundle \
            target/flatpak/repo \
            "target/flatpak/${{ steps.names.outputs.bundle_name }}" \
            org.luminusos.Aetheris \
            stable
          cp "target/flatpak/${{ steps.names.outputs.bundle_name }}" "dist/${{ steps.names.outputs.bundle_name }}"

      - name: Create source archive
        run: |
          git archive \
            --format=zip \
            --prefix="aetheris-${{ steps.names.outputs.version }}/" \
            --output="dist/${{ steps.names.outputs.source_name }}" \
            HEAD

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: |
            dist/${{ steps.names.outputs.bundle_name }}
            dist/${{ steps.names.outputs.source_name }}
          retention-days: 1
