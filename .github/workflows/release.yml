name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  ci:
    if: ${{ !contains(github.ref_name, '-') || contains(github.ref_name, '-rc') }}
    uses: ./.github/workflows/ci.yml

  flatpak:
    if: ${{ !contains(github.ref_name, '-') || contains(github.ref_name, '-rc') }}
    needs: [ci]
    uses: ./.github/workflows/release-flatpak.yml

  appimage:
    if: ${{ !contains(github.ref_name, '-') || contains(github.ref_name, '-rc') }}
    needs: [ci]
    uses: ./.github/workflows/release-appimage.yml

  macos:
    if: ${{ !contains(github.ref_name, '-') || contains(github.ref_name, '-rc') }}
    needs: [ci]
    uses: ./.github/workflows/release-macos.yml

  windows:
    if: ${{ !contains(github.ref_name, '-') || contains(github.ref_name, '-rc') }}
    needs: [ci]
    uses: ./.github/workflows/release-windows.yml

  release:
    name: Create GitHub Release
    if: ${{ !contains(github.ref_name, '-') || contains(github.ref_name, '-rc') }}
    runs-on: ubuntu-latest
    needs: [flatpak, appimage, macos, windows]
    steps:
      - name: Download Flatpak assets
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.flatpak.outputs.artifact-name }}
          path: dist

      - name: Download AppImage assets
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.appimage.outputs.artifact-name }}
          path: dist

      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.windows.outputs.artifact-name }}
          path: dist

      - name: Download macOS assets
        uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            dist/${{ needs.flatpak.outputs.bundle-name }}
            dist/${{ needs.appimage.outputs.appimage-name }}
            dist/aetheris-*-macos-*.dmg
            dist/${{ needs.windows.outputs.bundle-name }}
            dist/${{ needs.windows.outputs.setup-name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
