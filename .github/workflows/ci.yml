name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

jobs:
  rust:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y \
            git \
            gtk4-devel \
            gtksourceview5-devel \
            libadwaita-devel \
            openssl-devel \
            pkgconf-pkg-config \
            vte291-gtk4-devel

      - name: Check out sources
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
