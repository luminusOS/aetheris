<?xml version="1.0" encoding="UTF-8"?>
<!-- Aetheris app icon.

     Concept: the Aether — the highest, purest, brightest layer of the sky in
     classical mythology. A radiant orb floating in the upper air, with a ring
     of cluster nodes in orbit around it: your clusters, running clean and
     untouchable above the world.

     Follows the GNOME HIG for app icons: 128px grid, a distinct object
     silhouette instead of a full-bleed tile, simple geometric shapes, GNOME
     palette blues, flat colors with a gradient only on the curved orb, and a
     darker 4px profile at the bottom of the object. -->
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <!-- Gradient only on the curved surface of the orb, brighter toward
         the top where the light comes from. -->
    <linearGradient id="orb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#99c1f1"/>
      <stop offset="0.55" stop-color="#62a0ea"/>
      <stop offset="1" stop-color="#3584e4"/>
    </linearGradient>
    <clipPath id="orb-clip">
      <circle cx="64" cy="64" r="40"/>
    </clipPath>
    <clipPath id="node-a"><circle cx="64" cy="85" r="9"/></clipPath>
    <clipPath id="node-b"><circle cx="21.1" cy="77.5" r="7"/></clipPath>
    <clipPath id="node-c"><circle cx="106.9" cy="77.5" r="7"/></clipPath>
  </defs>

  <!-- Back half of the orbit ring, passing behind the orb. -->
  <path d="M 8 64 A 56 21 0 0 1 120 64" fill="none" stroke="#deddda" stroke-width="6"/>

  <!-- The orb: dark base circle shows through as the 4px bottom profile. -->
  <circle cx="64" cy="64" r="40" fill="#1a5fb4"/>
  <g clip-path="url(#orb-clip)">
    <circle cx="64" cy="60" r="40" fill="url(#orb)"/>
  </g>
  <!-- The radiant core of the aether. -->
  <circle cx="64" cy="56" r="15" fill="#ffffff" fill-opacity="0.35"/>
  <circle cx="64" cy="56" r="10" fill="#ffffff"/>

  <!-- Front half of the orbit ring, passing in front of the orb. -->
  <path d="M 8 64 A 56 21 0 0 0 120 64" fill="none" stroke="#f6f5f4" stroke-width="6"/>

  <!-- Cluster nodes riding the orbit, each with a darker bottom profile. -->
  <circle cx="64" cy="85" r="9" fill="#c0bfbc"/>
  <g clip-path="url(#node-a)"><circle cx="64" cy="83" r="9" fill="#ffffff"/></g>
  <circle cx="21.1" cy="77.5" r="7" fill="#c0bfbc"/>
  <g clip-path="url(#node-b)"><circle cx="21.1" cy="75.5" r="7" fill="#ffffff"/></g>
  <circle cx="106.9" cy="77.5" r="7" fill="#c0bfbc"/>
  <g clip-path="url(#node-c)"><circle cx="106.9" cy="75.5" r="7" fill="#ffffff"/></g>
</svg>
